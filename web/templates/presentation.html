<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <!-- Embed presentation stylesheet -->
    <link rel="stylesheet" href="/static/css/styles.css">
    {{ if .GoogleFontsURL }}
    <!-- Custom font(s) requested via fonts.sans/fonts.mono/headerFont -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ .GoogleFontsURL }}">
    {{ end }}
</head>
<body style="--slide-width: {{ .SlideWidthPx }}px; --slide-height: {{ .SlideHeightPx }}px;{{ if .Fonts.Sans }}--font-sans: {{ sansFontFamily .Fonts.Sans }};{{ end }}{{ if .Fonts.Mono }}--font-mono: {{ monoFontFamily .Fonts.Mono }};{{ end }}">
    <div id="slide-container">
        {{ range .Slides }}{{ template "slideBody" . }}{{ end }}

        <!-- Progress and indicator metrics -->
        <div id="progress-container" class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        {{ if .ShowSlideNumber }}<div id="slide-number" class="slide-number"></div>{{ end }}
    </div>

    <!-- Navigation Overlays -->
    <div class="nav-buttons">
        {{ if .ShowControls }}
        <button id="btn-prev" class="nav-btn" aria-label="Previous Slide">← Prev</button>
        <button id="btn-next" class="nav-btn" aria-label="Next Slide">Next →</button>
        {{ end }}
        <button id="btn-fullscreen" class="nav-btn" aria-label="Toggle Fullscreen">⛶</button>
    </div>

    <!-- Embed presentation javascript -->
    <script src="/static/js/app.js" defer></script>
</body>
</html>
