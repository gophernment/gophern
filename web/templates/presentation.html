<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <!-- Embed presentation stylesheet -->
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div id="slide-container">
        {{ range .Slides }}
        <div class="slide {{ if .Layout }}{{ .Layout }}{{ else }}default{{ end }}" 
             style="{{ if .Background }}background: {{ .Background }};{{ end }} {{ if .Color }}color: {{ .Color }};{{ end }}">
            <!-- Render slide content as unescaped raw HTML -->
            {{ .HTMLContent | safe }}
        </div>
        {{ end }}

        <!-- Progress and indicator metrics -->
        <div class="progress-bar-container">
            <div class="progress-bar"></div>
        </div>
        <div class="slide-number"></div>
    </div>

    <!-- Navigation Overlays -->
    <div class="nav-buttons">
        <button id="btn-prev" class="nav-btn" aria-label="Previous Slide">← Prev</button>
        <button id="btn-next" class="nav-btn" aria-label="Next Slide">Next →</button>
    </div>

    <!-- Embed presentation javascript -->
    <script src="/static/js/app.js" defer></script>
</body>
</html>
