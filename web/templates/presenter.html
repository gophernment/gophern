<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presenter Console - {{ .Title }}</title>
    <!-- Embed presentation stylesheet to render slides properly in the previews -->
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
    
    <style>
        /* Presenter Console Specific Styles */
        :root {
            --bg-presenter: #080c14;
            --bg-card: rgba(30, 41, 59, 0.45);
            --border-card: rgba(255, 255, 255, 0.08);
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-presenter);
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 0;
            font-family: var(--font-sans);
            color: var(--text-primary);
        }

        /* Header Layout */
        .presenter-header {
            height: 70px;
            border-bottom: 1px solid var(--border-card);
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
            flex-shrink: 0;
        }

        .presentation-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 35%;
        }

        /* Timer and Clock Display */
        .timer-container {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .timer-display {
            font-family: var(--font-mono);
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-primary);
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            letter-spacing: 0.05em;
        }

        .timer-controls {
            display: flex;
            gap: 0.5rem;
        }

        .timer-btn {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--accent-primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .timer-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }

        .slide-info-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-card);
            border-radius: 9999px;
            padding: 6px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* Main Workspace Layout */
        .presenter-main {
            display: grid;
            grid-template-columns: 1.25fr 0.75fr;
            gap: 1.5rem;
            padding: 1.5rem;
            flex-grow: 1;
            overflow: hidden;
            height: calc(100vh - 70px);
        }

        .pane {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        .pane-header {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* 16:9 Previews */
        .preview-viewport-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg-main);
            border: 1px solid var(--border-slide);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }

        .slide-preview-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 960px;
            height: 540px;
            transform-origin: top left;
        }

        .current-viewport {
            transform: scale(var(--current-scale, 0.6));
        }

        .next-viewport {
            transform: scale(var(--next-scale, 0.45));
        }

        /* Right column sections */
        .right-pane {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: 100%;
            overflow: hidden;
        }

        .next-slide-section {
            flex-shrink: 0;
        }

        .speaker-notes-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 150px;
            overflow: hidden;
        }

        .notes-content-wrapper {
            flex-grow: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            padding: 1.5rem;
            overflow-y: auto;
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-secondary);
            white-space: pre-wrap;
        }

        .notes-content-wrapper .no-notes {
            color: var(--text-muted);
            font-style: italic;
        }

        /* Navigation Controls bar at bottom right */
        .presenter-controls {
            display: flex;
            gap: 1rem;
            flex-shrink: 0;
            margin-top: auto;
        }

        .control-btn {
            flex: 1;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--border-card);
            color: var(--text-primary);
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s ease;
            text-align: center;
        }

        .control-btn:hover:not(:disabled) {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
            transform: translateY(-1px);
        }

        .control-btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <!-- Presenter Header -->
    <header class="presenter-header">
        <div class="presentation-title">{{ .Title }}</div>
        
        <!-- Digital Timer -->
        <div class="timer-container">
            <span class="timer-display" id="elapsed-timer">00:00:00</span>
            <div class="timer-controls">
                <button id="btn-reset-timer" class="timer-btn">Reset</button>
            </div>
        </div>

        <div id="slide-info" class="slide-info-pill">Slide - / -</div>
    </header>

    <!-- Main Workspace -->
    <div class="presenter-main">
        <!-- Left Side: Current Slide Viewport -->
        <div class="pane">
            <div class="pane-header">Current Slide</div>
            <div class="preview-viewport-wrapper" id="current-wrapper">
                <div id="current-slide-preview" class="slide-preview-container current-viewport">
                    <!-- Dynamic slide content -->
                </div>
            </div>
        </div>

        <!-- Right Side: Next Slide, Notes, Controls -->
        <div class="pane right-pane">
            <!-- Next Slide Preview -->
            <div class="next-slide-section">
                <div class="pane-header">Next Slide</div>
                <div class="preview-viewport-wrapper" id="next-wrapper">
                    <div id="next-slide-preview" class="slide-preview-container next-viewport">
                        <!-- Dynamic next slide content -->
                    </div>
                </div>
            </div>

            <!-- Speaker Notes -->
            <div class="speaker-notes-section">
                <div class="pane-header">Speaker Notes</div>
                <div class="notes-content-wrapper" id="speaker-notes">
                    <!-- Dynamic speaker notes -->
                </div>
            </div>

            <div class="presenter-controls">
                <button id="btn-prev" class="control-btn" aria-label="Previous Slide">← Prev</button>
                <button id="btn-next" class="control-btn" aria-label="Next Slide">Next →</button>
            </div>
        </div>
    </div>

    <!-- JSON definition of slides data -->
    <script id="slides-json" type="application/json">
        {{ json .Slides }}
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = JSON.parse(document.getElementById('slides-json').textContent);
            let currentIndex = 0;

            // Handle scale calculations for current and next slide viewports
            function updatePreviewScales() {
                const currentWrapper = document.getElementById('current-wrapper');
                const nextWrapper = document.getElementById('next-wrapper');

                if (currentWrapper) {
                    const scale = currentWrapper.clientWidth / 960;
                    document.documentElement.style.setProperty('--current-scale', scale.toString());
                }
                if (nextWrapper) {
                    const scale = nextWrapper.clientWidth / 960;
                    document.documentElement.style.setProperty('--next-scale', scale.toString());
                }
            }

            window.addEventListener('resize', updatePreviewScales);
            updatePreviewScales();

            // Renders the preview content inside current/next container
            function renderSlideContent(container, slide) {
                if (!slide) return;
                
                container.innerHTML = `
                    <div class="slide active ${slide.Layout || 'default'}" 
                         style="${slide.Background ? 'background: ' + slide.Background + ';' : ''} ${slide.Color ? 'color: ' + slide.Color + ';' : ''}">
                        ${slide.HTMLContent}
                    </div>
                `;
            }

            // Update UI components when index changes
            function updatePresenterUI(index) {
                if (index < 0 || index >= slides.length) return;
                currentIndex = index;

                // 1. Update current slide preview
                const currentSlide = slides[currentIndex];
                const currentContainer = document.getElementById('current-slide-preview');
                renderSlideContent(currentContainer, currentSlide);

                // 2. Update next slide preview
                const nextContainer = document.getElementById('next-slide-preview');
                if (currentIndex + 1 < slides.length) {
                    renderSlideContent(nextContainer, slides[currentIndex + 1]);
                } else {
                    nextContainer.innerHTML = `
                        <div class="slide active cover" style="background: #0f172a; justify-content: center; align-items: center; display: flex; height: 100%;">
                            <h1>End of Presentation</h1>
                            <p>No further slides remaining.</p>
                        </div>
                    `;
                }

                // 3. Update speaker notes
                const notesContainer = document.getElementById('speaker-notes');
                if (currentSlide.SpeakerNotes) {
                    notesContainer.textContent = currentSlide.SpeakerNotes;
                } else {
                    notesContainer.innerHTML = '<span class="no-notes">No speaker notes for this slide.</span>';
                }

                // 4. Update slide info indicators
                document.getElementById('slide-info').textContent = `Slide ${currentIndex + 1} / ${slides.length}`;

                // 5. Button states
                document.getElementById('btn-prev').disabled = (currentIndex === 0);
                document.getElementById('btn-next').disabled = (currentIndex === slides.length - 1);
            }

            // POST slide change update to server
            function sendSlideChange(index) {
                if (index < 0 || index >= slides.length) return;
                fetch('/api/slide', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ index: index })
                }).catch(err => console.error('Failed to change slide:', err));
            }

            // Keyboard navigation
            window.addEventListener('keydown', (e) => {
                const activeEl = document.activeElement;
                if (activeEl && (
                    activeEl.tagName === 'INPUT' || 
                    activeEl.tagName === 'TEXTAREA' || 
                    activeEl.isContentEditable)) {
                    return;
                }
                switch (e.key) {
                    case 'ArrowRight':
                    case ' ':
                    case 'PageDown':
                        e.preventDefault();
                        sendSlideChange(currentIndex + 1);
                        break;
                    case 'ArrowLeft':
                    case 'PageUp':
                        e.preventDefault();
                        sendSlideChange(currentIndex - 1);
                        break;
                }
            });

            // Button clicks
            document.getElementById('btn-prev').addEventListener('click', () => {
                sendSlideChange(currentIndex - 1);
            });
            document.getElementById('btn-next').addEventListener('click', () => {
                sendSlideChange(currentIndex + 1);
            });

            // Connect to Server-Sent Events
            if (window.location.protocol.startsWith('http')) {
                const eventSource = new EventSource('/events');
                eventSource.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.reload) {
                            window.location.reload();
                            return;
                        }
                        const idx = data.slide;
                        if (!isNaN(idx)) {
                            updatePresenterUI(idx);
                        }
                    } catch (err) {
                        console.error("Failed to parse SSE JSON payload:", err);
                    }
                };
                eventSource.onerror = (err) => {
                    console.error("SSE connection dropped, retrying...", err);
                };
            }

            // Elapsed Timer Logic
            let startTime = Date.now();
            let timerInterval = null;

            function updateTimer() {
                const elapsed = Date.now() - startTime;
                const seconds = Math.floor((elapsed / 1000) % 60);
                const minutes = Math.floor((elapsed / (1000 * 60)) % 60);
                const hours = Math.floor((elapsed / (1000 * 60 * 60)) % 24);

                const pad = (num) => String(num).padStart(2, '0');
                document.getElementById('elapsed-timer').textContent = `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
            }

            function startTimer() {
                startTime = Date.now();
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(updateTimer, 1000);
                updateTimer();
            }

            document.getElementById('btn-reset-timer').addEventListener('click', () => {
                startTimer();
            });

            startTimer();
            updatePresenterUI(0);
        });
    </script>
</body>
</html>
