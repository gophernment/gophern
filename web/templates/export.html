<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <!-- Embed presentation stylesheet inline -->
    <style>
        {{ .CSS }}
    </style>
</head>
<body style="{{ if .Fonts.Sans }}--font-sans: {{ sansFontFamily .Fonts.Sans }};{{ end }}{{ if .Fonts.Mono }}--font-mono: {{ monoFontFamily .Fonts.Mono }};{{ end }}">
    <div id="slide-container">
        {{ range .Slides }}{{ template "slideBody" . }}{{ end }}

        <!-- Progress and indicator metrics -->
        <div id="progress-container" class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="slide-number" class="slide-number"></div>
    </div>

    <!-- Navigation Overlays -->
    <div class="nav-buttons">
        <button id="btn-prev" class="nav-btn" aria-label="Previous Slide">← Prev</button>
        <button id="btn-next" class="nav-btn" aria-label="Next Slide">Next →</button>
    </div>

    <!-- Embed presentation javascript inline -->
    <script>
        {{ .JS }}
    </script>
</body>
</html>
